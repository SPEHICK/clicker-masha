<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Masha Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="fluidCanvas"></canvas>
    <div class="background-gradient"></div>
    <div class="container">
        <h1>Masha Clicker</h1>
        
        <div class="score-section">
            <div class="score">
                <span class="score-label">Очки:</span>
                <span id="score">0</span>
            </div>
            <div class="per-click">
                <span class="score-label">За клик:</span>
                <span id="perClick">1</span>
            </div>
        </div>

        <div class="click-area">
            <button id="clickButton" class="click-button">
                <img src="1.bmp" alt="Маша">
            </button>
        </div>

        <div class="tabs">
            <button class="tab-button active" data-tab="game">Игра</button>
            <button class="tab-button" data-tab="skins">Скины</button>
            <button class="tab-button" data-tab="leaderboard">Топ</button>
            <button class="tab-button" data-tab="profile">Профиль</button>
        </div>

        <div class="tab-content active" id="game-tab">
            <div class="upgrades">
                <h2>Улучшения</h2>
                <div class="upgrade-list">
                    <div class="upgrade-item">
                        <div class="upgrade-info">
                            <h3>Двойной клик</h3>
                            <p>+1 за клик</p>
                        </div>
                        <button class="upgrade-button" data-upgrade="click" data-cost="10">
                            Купить (10)
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="leaderboard-tab">
            <h2>Таблица лидеров</h2>
            <div id="leaderboard" class="leaderboard">
                <div class="loading">Загрузка...</div>
            </div>
        </div>

        <div class="tab-content" id="skins-tab">
            <h2>Магазин скинов</h2>
            <div id="skinsContainer" class="skins-container">
                <!-- Скины будут добавлены через JavaScript -->
            </div>
        </div>

        <div class="tab-content" id="profile-tab">
            <h2>Профиль</h2>
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <img id="profileAvatar" src="1.bmp" alt="Аватар">
                    </div>
                    <div class="profile-info">
                        <h3 id="profileName">Игрок</h3>
                        <p id="profileId" class="profile-id">ID: loading...</p>
                    </div>
                </div>
                
                <div class="profile-stats">
                    <div class="stat-card">
                        <div class="stat-icon">💎</div>
                        <div class="stat-info">
                            <div class="stat-label">Всего очков</div>
                            <div class="stat-value" id="profileScore">0</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">👆</div>
                        <div class="stat-info">
                            <div class="stat-label">Сила клика</div>
                            <div class="stat-value" id="profileClickPower">1</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">🎨</div>
                        <div class="stat-info">
                            <div class="stat-label">Скинов куплено</div>
                            <div class="stat-value" id="profileSkins">1</div>
                        </div>
                    </div>
                </div>
                
                <div class="profile-achievements">
                    <h3>Достижения</h3>
                    <div class="achievements-grid" id="achievementsGrid">
                        <!-- Достижения будут добавлены через JavaScript -->
                    </div>
                </div>
                
                <button id="resetButton" class="reset-button" style="display: none;">
                    🔄 Сбросить прогресс
                </button>
            </div>
        </div>
    </div>

    <script src="fluid.js"></script>
    <script src="telegram.js"></script>
    <script src="script.js"></script>
</body>
</html>
